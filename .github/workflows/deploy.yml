name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # 하위 폴더에 있는 package-lock.json 위치를 지정해 줍니다.
          cache-dependency-path: figma-dashboard/package-lock.json

      - name: Install dependencies
        # figma-dashboard 폴더 안에서 실행하도록 지정합니다.
        working-directory: figma-dashboard
        run: npm ci

      - name: Build
        # figma-dashboard 폴더 안에서 빌드를 수행합니다.
        working-directory: figma-dashboard
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 빌드 완료된 dist 폴더의 경로를 지정해 줍니다.
          path: './figma-dashboard/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4